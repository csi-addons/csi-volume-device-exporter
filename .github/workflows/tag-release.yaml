---
name: Build and release versioned container image

# yamllint disable-line rule:truthy
on:
  create

jobs:
  tag_exporter:
    name: Build and release the exporter container image
    if: >
      github.repository == 'csi-addons/csi-volume-device-exporter'
      &&
      github.ref_type  == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push exporter container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: quay.io/csiaddons/k8s-volume-device-exporter:${{ github.ref_name }}

  publish_release:
    name: Publish a release based on the tag
    if: >
      github.repository == 'csi-addons/csi-volume-device-exporter'
      &&
      github.ref_type  == 'tag'
    needs:
      - tag_exporter
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Publish the release and attach deploy manifests
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: "deploy/*.yaml"
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
