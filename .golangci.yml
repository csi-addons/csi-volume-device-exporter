version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - misspell

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
      - name: blank-imports
        severity: warning

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
