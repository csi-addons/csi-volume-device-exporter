---
name: Publish container image to quay.io

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main

jobs:
  push_exporter:
    name: Push exporter container image to quay.io
    if: github.repository == 'csi-addons/csi-volume-device-exporter'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push exporter container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: quay.io/csiaddons/k8s-volume-device-exporter:latest
