apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: csi-volume-device-exporter
# A custom SCC is used instead of the built-in 'privileged' SCC to follow
# the principle of least privilege. The exporter requires:
#   - hostPath volumes (read-only): /var/lib/kubelet (with mountPropagation: HostToContainer), /sys
# It explicitly does NOT need: privileged containers, hostPID, host networking,
# host ports, host IPC, or any Linux capabilities.
# mountPropagation: HostToContainer on /var/lib/kubelet makes the host's CSI
# mounts visible via stat(), eliminating the need for hostPID or a separate
# /proc bind mount.
# Using 'privileged' would grant all of the above unnecessarily.
allowPrivilegedContainer: false
allowHostDirVolumePlugin: true
allowHostPID: false
allowHostIPC: false
allowHostPorts: false
allowHostNetwork: false
readOnlyRootFilesystem: true
runAsUser:
  type: MustRunAs
  uid: 0
seLinuxContext:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
volumes:
  - hostPath
users:
  - system:serviceaccount:csi-volume-device-exporter:csi-volume-device-exporter
